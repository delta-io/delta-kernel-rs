[package]
name = "read-table-multi-threaded"
version = "0.1.0"
edition = "2021"
publish = false

[features]
default = ["arrow"]
arrow = ["arrow-58"]
arrow-58 = ["common/arrow-58"]
arrow-57 = ["common/arrow-57"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
common = { path = "../common", default-features = false }
delta_kernel = { path = "../../../kernel", features = [
  "default-engine-rustls",
  "internal-api",
  "prettyprint",
] }
env_logger = "0.11.8"
spmc = "0.3.0"
url = "2"

# for cargo-release
[package.metadata.release]
release = false
