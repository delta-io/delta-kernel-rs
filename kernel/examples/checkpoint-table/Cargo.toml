[package]
name = "checkpoint-table"
version = "0.1.0"
edition = "2021"
publish = false

[features]
default = ["arrow"]
arrow = ["arrow-57"]
arrow-57 = ["common/arrow-57"]
arrow-56 = ["common/arrow-56"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
common = { path = "../common", default-features = false }
delta_kernel = { path = "../../../kernel", features = [
  "internal-api",
] }
delta_kernel_default_engine = { path = "../../../default-engine", features = ["rustls", "arrow"] }
env_logger = "0.11.8"
tokio = { version = "1.0", features = ["full"] }
url = "2"
bytes = "1.11.0"
futures = "0.3.31"

# for cargo-release
[package.metadata.release]
release = false
