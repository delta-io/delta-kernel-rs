[package]
name = "inspect-table"
version = "0.1.0"
edition = "2021"
publish = false

[features]
default = ["arrow"]
arrow = ["arrow-57"]
arrow-57 = ["common/arrow-57"]
arrow-56 = ["common/arrow-56"]

[dependencies]
chrono = "0.4.42"
clap = { version = "4.5", features = ["derive"] }
common = { path = "../common", default-features = false }
delta_kernel = { path = "../../../kernel", features = [
  "default-engine-rustls",
  "internal-api",
] }
env_logger = "0.11.8"

# for cargo-release
[package.metadata.release]
release = false
