[package]
name = "read-table-changes"
version = "0.1.0"
edition = "2021"
publish = false

# for cargo-release
[package.metadata.release]
release = false

[features]
default = ["arrow"]
arrow = ["arrow-59"]
arrow-59 = ["common/arrow-59"]
arrow-58 = ["common/arrow-58"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
common = { path = "../common", default-features = false }
delta_kernel = { path = "../../../kernel", features = [
  "default-engine-base",
  "internal-api",
  "prettyprint",
] }
delta_kernel_default_engine = { path = "../../../default-engine", features = ["rustls"] }
itertools = "0.14"
