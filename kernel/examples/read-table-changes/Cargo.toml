[package]
name = "read-table-changes"
version = "0.1.0"
edition = "2021"
publish = false

# for cargo-release
[package.metadata.release]
release = false

[features]
default = ["arrow"]
arrow = ["arrow-57"]
arrow-57 = ["common/arrow-57"]
arrow-56 = ["common/arrow-56"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
common = { path = "../common", default-features = false }
delta_kernel = { path = "../../../kernel", features = [
  "default-engine-rustls",
  "internal-api",
  "prettyprint",
] }
itertools = "0.14"
