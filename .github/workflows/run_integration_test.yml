name: Run tests to ensure we can compile across arrow versions

on: [workflow_dispatch, push, pull_request, merge_group]

env:
  # The arrow integration test script runs `cargo clean` between each arrow version,
  # wiping the target directory. sccache survives this because it caches individual rustc
  # outputs externally. Without sccache, each arrow version rebuild starts from scratch;
  # with it, only the arrow crates themselves recompile while all other deps hit cache.
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  arrow_integration_test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macOS-latest
          - os: ubuntu-latest
          - os: windows-latest
            skip: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }} # skip running windows tests on PRs and merge queue since they are slow
    steps:
      - name: Skip job for pull requests on Windows
        if: ${{ matrix.skip }}
        run: echo "Skipping job for pull requests on Windows."
      - uses: actions/checkout@v4
        if: ${{ !matrix.skip }}
      - name: Setup rust toolchain
        if: ${{ !matrix.skip }}
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: mozilla-actions/sccache-action@v0.0.9
        if: ${{ !matrix.skip }}
      - name: Run integration tests
        if: ${{ !matrix.skip }}
        shell: bash
        run: pushd integration-tests && ./test-all-arrow-versions.sh
      - name: sccache stats
        if: ${{ !matrix.skip && always() }}
        run: sccache --show-stats
