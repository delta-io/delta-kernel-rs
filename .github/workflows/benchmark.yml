name: run benchmarks

on: [pull_request]

jobs:
  benchmark:
    name: run benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Save PR info
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt
      - uses: actions/upload-artifact@v4
        with:
          name: pr-number
          path: pr-number.txt
