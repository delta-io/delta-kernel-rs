name: Benchmark PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  run-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2

      - name: Install critcmp
        run: cargo install critcmp

      - name: Benchmark PR branch
        run: cargo bench --bench workload_bench -- --save-baseline changes --noplot
        working-directory: benchmarks

      - name: Checkout base branch
        run: git checkout ${{ github.base_ref }}

      - name: Benchmark base branch
        run: cargo bench --bench workload_bench -- --save-baseline base --noplot
        working-directory: benchmarks

      - name: Compare
        run: critcmp base changes | tee bench-comparison.txt
        working-directory: benchmarks

      - name: Save PR number
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmarks/bench-comparison.txt
            pr-number.txt
