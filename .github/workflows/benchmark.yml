# Benchmarks run on three triggers:
#   - pull_request_target: every push to a PR auto-runs with BENCH_TAGS=base
#   - issue_comment: a /bench [--tags ...] [--filter ...] comment runs with
#                    the supplied flags
#   - merge_group: declared so this workflow can be added to branch protection
#                  as a required status check later. Currently a no-op (no
#                  benching happens on merge queue events), since the result
#                  has no PR conversation to post to and no automated
#                  regression-detection threshold to act as a hard gate.
# pull_request_target and issue_comment funnel into the same jobs and update
# the same PR comment via a hidden marker (<!-- delta-kernel-bench-comment
# -->) so reviewers always see one current comment instead of a stack.
#
# SECURITY MODEL
# --------------
# - `run-benchmark` checks out and executes untrusted PR code. It declares
#   `permissions: { contents: read }` so the GITHUB_TOKEN visible to that
#   job is read-only even under pull_request_target (which would otherwise
#   hand out a full-scope token in the base-branch context). Do not add
#   other secrets to that job and do not grant additional permissions.
# - The Swatinem/rust-cache `save-if` guard MUST stay restricted to push
#   events on main. This workflow has no `push` trigger, so it never writes
#   the cache; that is what prevents a malicious PR from poisoning it. Do
#   not relax the `github.event_name == 'push'` clause.
# - `post-comment` and `post-failure-comment` only touch the markdown
#   artifact (string data) and run pinned-by-SHA actions. They never check
#   out PR code.
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  issue_comment:
    types: [created, edited]

name: Benchmarking PR performance

# Start from an empty default; each job opts into the minimum scopes it needs.
# Adding a new job without thinking about permissions inherits zero, not full.
permissions: {}

jobs:
  bench-merge-queue-noop:
    # Placeholder job for the merge_group trigger so the workflow can be wired
    # up as a required status check later without restructuring. Does nothing
    # meaningful today (see top-level comment for rationale).
    name: Bench (merge queue no-op)
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Benchmark workflow is a no-op on merge queue events."

  run-benchmark:
    name: Run benchmarks
    # Auto-trigger: PR push events, skipping drafts. Comment-trigger: a
    # literal /bench, optionally followed by args (e.g. /bench --tags base).
    if: >
      (github.event_name == 'pull_request_target' && github.event.pull_request.draft == false)
      || (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
          (github.event.comment.body == '/bench' || startsWith(github.event.comment.body, '/bench ')))
    # Job-level (not workflow-level) so unrelated PR comments don't join the
    # group and cancel an in-flight bench via cancel-in-progress.
    concurrency:
      group: bench-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
    steps:
      - name: Get PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER:   ${{ github.event.pull_request.number }}
        run: |
          # GitHub Actions runs bash with -eo pipefail by default; -u catches
          # typos / unset variables. All four fields below are then validated
          # against strict allowlists before being used or emitted -- the PR
          # head sha and base ref are attacker-controllable (fork PR author),
          # and the issue/PR number is concatenated into a gh api URL.
          set -u
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            # /bench path: the issue_comment payload doesn't include the PR
            # head/base, so look it up via the API. Validate the number first
            # so a malformed value cannot inject path segments into the URL.
            [[ "$ISSUE_NUMBER" =~ ^[1-9][0-9]*$ ]] \
              || { echo "Invalid ISSUE_NUMBER: $ISSUE_NUMBER" >&2; exit 1; }
            PR_DATA=$(gh api "repos/$REPO/pulls/$ISSUE_NUMBER")
            HEAD_SHA=$(echo "$PR_DATA" | jq -r .head.sha)
            BASE_REF=$(echo "$PR_DATA" | jq -r .base.ref)
            NUM="$ISSUE_NUMBER"
          else
            # Auto-trigger path: pull_request_target payload has everything.
            HEAD_SHA="$PR_HEAD_SHA"
            BASE_REF="$PR_BASE_REF"
            NUM="$PR_NUMBER"
            [[ "$NUM" =~ ^[1-9][0-9]*$ ]] \
              || { echo "Invalid PR_NUMBER: $NUM" >&2; exit 1; }
          fi
          # HEAD_SHA must be a hex Git SHA (40 char SHA-1 or 64 char SHA-256).
          # The allowlist also catches the empty-string case if jq somehow
          # returned no value.
          [[ "$HEAD_SHA" =~ ^[a-f0-9]{40,64}$ ]] \
            || { echo "Invalid HEAD_SHA: $HEAD_SHA" >&2; exit 1; }
          # BASE_REF is a Git ref name; standard ref-name allowlist (letters,
          # digits, slash, dot, dash, underscore). Both regexes exclude
          # newlines, so no separate newline check is needed.
          [[ "$BASE_REF" =~ ^[a-zA-Z0-9/_.-]+$ ]] \
            || { echo "Invalid BASE_REF: $BASE_REF" >&2; exit 1; }
          printf 'head_sha=%s\n' "$HEAD_SHA" >> "$GITHUB_OUTPUT"
          printf 'base_ref=%s\n'  "$BASE_REF"  >> "$GITHUB_OUTPUT"
          printf 'pr_number=%s\n' "$NUM"      >> "$GITHUB_OUTPUT"
      - name: Install critcmp
        # Installed before checkout so the PR's .cargo/config.toml cannot
        # redirect the registry to a malicious source. The runner's
        # pre-installed Rust is sufficient -- no toolchain setup needed here.
        # --locked is omitted for cargo install (same exemption as cargo miri
        # setup); --version pins the top-level crate.
        run: cargo install critcmp --version 0.1.8
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: false
      # See build.yml top-level comment for why save-if is restricted to main and why
      # cache-bin is disabled.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-bin: false
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      - name: Run benchmarks
        # The comment is posted in the post-comment job after this job completes.
        # COMMENT is only meaningful under issue_comment; under pull_request_target
        # the expression resolves to "" and the script treats that as bare /bench.
        env:
          COMMENT:  ${{ github.event.comment.body }}
          TRIGGER:  ${{ github.event_name == 'issue_comment' && '/bench' || 'auto-push' }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: bash benchmarks/ci/run-benchmarks.sh
      - name: Upload benchmark comment
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bench-comment
          path: /tmp/bench-comment.md

  post-comment:
    name: Post benchmark results
    needs: run-benchmark
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download benchmark comment
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: bench-comment
          path: /tmp/
      - name: Find existing bench comment
        id: find
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
        with:
          issue-number: ${{ needs.run-benchmark.outputs.pr_number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- delta-kernel-bench-comment -->'
      - name: Post or update PR comment
        # When `comment-id` is empty (no prior comment) this creates one;
        # otherwise it replaces the existing body. Either way only one bench
        # comment exists on the PR.
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ needs.run-benchmark.outputs.pr_number }}
          edit-mode: replace
          body-path: /tmp/bench-comment.md

  post-failure-comment:
    name: Post failure note to PR
    needs: run-benchmark
    # Runs only when run-benchmark failed (not when it was cancelled by the
    # concurrency group -- a superseding run will post its own update). Without
    # this job, a previous green comment would mislead reviewers after a push
    # that breaks the bench itself.
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find existing bench comment
        id: find
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
        with:
          # Pulled directly from the event payload because run-benchmark may
          # have failed before publishing its pr_number output.
          issue-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- delta-kernel-bench-comment -->'
      - name: Post or update failure note
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          edit-mode: replace
          body: |
            <!-- delta-kernel-bench-comment -->
            ## Benchmark results

            <sub>Benchmark run failed. [See workflow run](${{ env.RUN_URL }}) for details.</sub>
