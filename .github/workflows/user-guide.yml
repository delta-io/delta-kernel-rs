name: user-guide

on: [push, pull_request, merge_group]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  user-guide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install minimal stable
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: false
      # See build.yml top-level comment for why save-if is restricted to main.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      # mdbook: builds and serves the book.
      # mdbook-mermaid: preprocessor that renders ```mermaid blocks as diagrams.
      - uses: taiki-e/install-action@7bc99eee1f1b8902a125006cf790a1f4c8461e63 # v2.69.8
        with:
          tool: mdbook,mdbook-mermaid
      # mdbook-linkcheck2: backend that fails the build on broken internal
      # `[link](../foo.md)` references and missing #section anchors. It's a
      # maintained fork of mdbook-linkcheck; the original is incompatible
      # with mdbook 0.5+. Not in taiki-e/install-action's catalog, so we
      # cargo install it directly.
      - name: Install mdbook-linkcheck2
        run: cargo install --locked mdbook-linkcheck2
      # Compiles every Rust code block in the guide via mdbook test, using the
      # kernel deps that the Makefile builds first.
      - name: Test that all code examples compile
        working-directory: docs/user-guide
        run: make test
      # Renders the book to HTML; with [output.linkcheck2] in book.toml this
      # also runs mdbook-linkcheck2, so broken internal links fail CI here.
      - name: Build the book
        working-directory: docs/user-guide
        run: mdbook build
