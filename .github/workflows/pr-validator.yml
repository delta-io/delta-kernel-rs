name: Validate PR Title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  validate-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/pr-title-validator
        with:
          regex: '^(feat|fix|chore|docs|refactor|test|ci)(\(.+\))?: .{1,72}$'
