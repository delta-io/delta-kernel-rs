# Pin the nightly toolchain used for `cargo +nightly fmt` so that fmt output
# does not drift between contributors. The branch is canonical against the
# pinned channel; any future fmt-version drift becomes an explicit toolchain
# bump rather than a silent reformat of unrelated files.
#
# The pin only matters for fmt — workspace builds run on the stable channel
# selected by callers (cargo / IDE / CI). Components list narrows what
# rustup installs to just what fmt needs.
[toolchain]
channel = "nightly-2026-04-23"
components = ["rustfmt"]
profile = "minimal"
