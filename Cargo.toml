[workspace]
members = [
    "acceptance",
    "benchmarks",
    "derive-macros",
    "ffi",
    "kernel",
    "kernel/examples/*",
    "test-utils",
    "feature-tests",
    "mem-test",
    "unity-catalog-delta-rest-client", # WIP: this is an experimental UC client for catalog-managed table work
    "delta-kernel-unity-catalog", # WIP: this is an experimental UC catalog implementation
    "unity-catalog-delta-client-api", # WIP: transport-agnostic UC client API traits
    "delta-kernel-datafusion-engine",
]
# note that in addition to the members above, the workspace includes examples:
# - inspect-table
# - read-table-changes
# - read-table-multi-threaded
# - read-table-single-threaded
# - write-table
resolver = "3"

# Patched DataFusion fork adding virtual-column hooks + parquet field-ID-aware root adaptation
# to `datafusion-datasource-parquet`. Tracks DataFusion 53.1.0 plus the
# `delta-kernel-vendor-patch` branch on the fork. Every datafusion crate in our dep graph
# must come from the fork — otherwise type identity diverges between the fork's parquet
# crate (which sees fork-built sibling types) and crates.io copies brought in transitively.
[patch.crates-io]
# TEMP: pointing at local fork for upstream nested_struct.rs sync. Revert to
# `git = ".../OussamaSaoudi/datafusion.git", rev = "<new-rev>"` once the fork
# branch is pushed.
datafusion = { path = "/home/oussama.saoudi/datafusion-fork/datafusion/core" }
datafusion-catalog = { path = "/home/oussama.saoudi/datafusion-fork/datafusion/catalog" }
datafusion-catalog-listing = { path = "/home/oussama.saoudi/datafusion-fork/datafusion/catalog-listing" }
