datafusion-sql = { git = "https://github.com/OussamaSaoudi/datafusion.git", rev = "bf8dc9a7b" }

[workspace.package]
edition = "2021"
homepage = "https://delta.io"
keywords = ["deltalake", "delta", "datalake"]
license = "Apache-2.0"
