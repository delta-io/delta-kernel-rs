[package]
name = "delta_kernel_benchmarks"
publish = false
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true
rust-version.workspace = true

[features]
default = ["arrow"]
arrow = ["arrow-57"]
arrow-57 = ["delta_kernel/arrow-57"]
arrow-56 = ["delta_kernel/arrow-56"]

[dependencies]
delta_kernel = { path = "../kernel", features = ["default-engine-rustls", "internal-api"] }
flate2 = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tar = "0.4"
url = { version = "2", features = ["serde"] }

[dev-dependencies]
criterion = "0.5"
rstest = "0.23"

[[bench]]
name = "workload_bench"
harness = false
